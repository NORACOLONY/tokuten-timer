<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特典会タイマー</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: sans-serif;
  background: black;
  color: white;
  text-align: center;
  max-width: 100vw;
  overflow-x: hidden; /* 横スクロール防止 */
}

h2 { margin: 8px 0; font-size: 18px; }

#tabs {
  display: flex;
  gap: 2px;
  padding: 4px;
  overflow-x: auto;
}

.tab {
  flex: 1 0 auto;
  background: #222;
  padding: 4px;
  border-radius: 6px;
  font-size: 12px;
  white-space: nowrap;
}

.activeTab { background: #00ff88; color: black; }

#container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2px;
  padding: 2px;
  width: 100%;
}

.row {
  border-radius: 8px;
  padding: 3px;
  display: flex;
  flex-direction: column;
  width: 100%;
  transition: height 0.2s;
}

.top {
  display: flex;
  gap: 4px;
  width: 100%;
}

.name {
  flex: 1 1 auto;
  font-size: 14px;
  padding: 4px;
  min-width: 0;
}

.color {
  width: 28px;
  flex-shrink: 0;
  height: 28px;
  border: none;
  padding: 0;
}

.time {
  font-size: clamp(16px, 5vw, 28px);
  margin: 2px 0;
}

.buttons {
  display: flex;
  gap: 2px;
  width: 100%;
}

button {
  flex: 1;
  padding: 8px 0;
  font-size: 14px;
  border-radius: 6px;
  border: none;
}

.active { background: #00ff88; color: black; }

.blink { animation: blinkBg 0.6s infinite; }
@keyframes blinkBg { 50% { opacity: 0.4; } }

#controls {
  margin: 6px 0;
  display: flex;
  gap: 4%;
  justify-content: center;
}

#controls button { width: 45%; font-size: 14px; padding: 8px 0; }

#footer {
  margin: 12px 0;
  font-size: 10px;
  opacity: 0.5;
  letter-spacing: 2px;
  text-transform: uppercase;
}
</style>
</head>
<body>

<h2>特典会タイマー</h2>
<div id="tabs"></div>
<div id="container"></div>

<div id="controls">
  <button onclick="addRow()">＋追加</button>
  <button onclick="removeRow()">−削除</button>
</div>

<div id="footer">Created by TEURU</div>

<audio id="endSound" preload="auto">
  <source src="sounds/bell.mp3" type="audio/mpeg">
</audio>

<script>
let currentTab=0, maxRows=10;
const sound=document.getElementById("endSound");
sound.load();

/* タブ生成 */
for(let i=0;i<5;i++){
  const tab=document.createElement("div");
  tab.className="tab";
  tab.innerText=localStorage.getItem("tab_name_"+i)||"Preset "+(i+1);
  tab.onclick=()=>{
    if(currentTab===i){
      const newName=prompt("プリセット名を変更",tab.innerText);
      if(newName){ tab.innerText=newName; localStorage.setItem("tab_name_"+i,newName);}
    } else { switchTab(i); }
  };
  document.getElementById("tabs").appendChild(tab);
}

function switchTab(i){ currentTab=i; loadPreset(); updateTabs(); optimizeRows(); }
function updateTabs(){ document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("activeTab",i===currentTab)); }

function savePreset(){
  const data=[]; document.querySelectorAll(".row").forEach(r=>data.push({name:r.querySelector(".name").value,color:r.dataset.color}));
  localStorage.setItem("preset_"+currentTab,JSON.stringify(data));
}

function loadPreset(){
  const container=document.getElementById("container");
  container.innerHTML="";
  const data=JSON.parse(localStorage.getItem("preset_"+currentTab)||"null");
  if(!data||data.length===0) for(let i=0;i<6;i++) createRow();
  else data.forEach(d=>createRow(0,d));
  optimizeRows();
}

function createRow(i,data={}){
  let time=30,interval=null,running=false;

  const row=document.createElement("div");
  row.className="row";
  row.style.background=data.color||"#333";
  row.dataset.color=data.color||"#333";

  row.onclick=()=>{
    if(interval){
      clearInterval(interval);
      running=false;
      btn30.classList.remove("active");
      btn60.classList.remove("active");
      sound.pause();
      sound.currentTime=0;
      row.classList.remove("blink");
    }
  };

  const top=document.createElement("div"); top.className="top";
  const name=document.createElement("input"); name.className="name"; name.value=data.name||""; name.oninput=savePreset;
  const color=document.createElement("input"); color.type="color"; color.className="color"; color.value=data.color||"#444444"; 
  color.oninput=()=>{ row.style.background=color.value; row.dataset.color=color.value; savePreset(); };

  const display=document.createElement("div"); display.className="time"; display.innerText=time;

  const btn30=document.createElement("button"); btn30.innerText="30"; btn30.onclick=(e)=>{ e.stopPropagation(); start(30,btn30); };
  const btn60=document.createElement("button"); btn60.innerText="60"; btn60.onclick=(e)=>{ e.stopPropagation(); start(60,btn60); };

  function stopTimer(){ clearInterval(interval); running=false; btn30.classList.remove("active"); btn60.classList.remove("active"); sound.pause(); sound.currentTime=0; row.classList.remove("blink"); }
  function start(sec,btn){ if(running) return stopTimer(); stopTimer(); time=sec; running=true; btn.classList.add("active"); interval=setInterval(()=>{ if(time>0){ time--; display.innerText=time;}else{ stopTimer(); sound.currentTime=0; sound.play().catch(e=>console.log(e)); row.classList.add("blink"); } },1000); }

  const btnWrap=document.createElement("div"); btnWrap.className="buttons"; btnWrap.appendChild(btn30); btnWrap.appendChild(btn60);

  row.appendChild(top); top.appendChild(name); top.appendChild(color); row.appendChild(display); row.appendChild(btnWrap);
  document.getElementById("container").appendChild(row);
}

function addRow(){ if(document.querySelectorAll(".row").length<maxRows){ createRow(); savePreset(); optimizeRows(); } }
function removeRow(){ let rows=document.querySelectorAll(".row"); if(rows.length>0){ rows[rows.length-1].remove(); savePreset(); optimizeRows(); } }

/* 枠の高さ自動調整 */
function optimizeRows(){
  const rows=document.querySelectorAll('.row');
  if(rows.length===0) return;
  const screenHeight=window.innerHeight-150; // タブ・コントロール・余白を考慮
  const rowHeight=Math.floor(screenHeight / rows.length);
  rows.forEach(r=>r.style.height=rowHeight+'px');
}

/* 画面リサイズ時も最適化 */
window.addEventListener('resize', optimizeRows);

switchTab(0); updateTabs();
</script>

</body>
</html>
