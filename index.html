<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特典会タイマー</title>

<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: sans-serif;
  background: black;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

h2 { margin: 10px 0; }

#tabs {
  display: flex;
  gap: 5px;
  padding: 5px;
}

.tab {
  flex: 1;
  background: #222;
  padding: 8px;
  border-radius: 6px;
  font-size: 12px;
}

.activeTab {
  background: #00ff88;
  color: black;
}

#container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  padding: 6px;
}

.row {
  border-radius: 12px;
  padding: 8px;
}

.top {
  display: flex;
  gap: 3px;
}

.name {
  flex: 1;
  font-size: 14px;
  min-width: 0;
}

.color {
  width: 36px;
}

.time {
  font-size: clamp(22px, 5vw, 34px);
  margin: 4px 0;
}

.buttons {
  display: flex;
  gap: 4px;
}

button {
  flex: 1;
  padding: 10px 0;
  font-size: 14px;
  border-radius: 8px;
  border: none;
  min-width: 0;
}

.active {
  background: #00ff88;
  color: black;
}

.blink {
  animation: blinkBg 0.6s infinite;
}

@keyframes blinkBg {
  50% { opacity: 0.4; }
}

#controls {
  margin: 10px;
  display: flex;
  gap: 4%;
  justify-content: center;
}

#controls button {
  width: 45%;
}

#footer {
  margin: 20px 0;
  font-size: 11px;
  opacity: 0.5;
  letter-spacing: 3px;
  text-transform: uppercase;
}
</style>
</head>

<body>

<h2>特典会タイマー</h2>

<div id="tabs"></div>
<div id="container"></div>

<div id="controls">
  <button onclick="addRow()">＋追加</button>
  <button onclick="removeRow()">−削除</button>
</div>

<div id="footer">Created by TEURU</div>

<audio id="endSound" preload="auto">
  <source src="sounds/bell.mp3" type="audio/mpeg">
</audio>

<script>
let currentTab = 0;
let maxRows = 10;
const sound = document.getElementById("endSound");
sound.load(); // 確実に音声を読み込む

/* タブ生成 */
for (let i = 0; i < 5; i++) {
  let tab = document.createElement("div");
  tab.className = "tab";

  tab.innerText = localStorage.getItem("tab_name_"+i) || "Preset " + (i+1);

  tab.onclick = () => {
    if (currentTab === i) {
      let newName = prompt("プリセット名を変更", tab.innerText);
      if (newName) {
        tab.innerText = newName;
        localStorage.setItem("tab_name_"+i, newName);
      }
    } else {
      switchTab(i);
    }
  };

  document.getElementById("tabs").appendChild(tab);
}

/* タブ切替 */
function switchTab(i) {
  currentTab = i;
  loadPreset();
  updateTabs();
}

function updateTabs() {
  document.querySelectorAll(".tab").forEach((t, i) => {
    t.classList.toggle("activeTab", i === currentTab);
  });
}

/* 保存 */
function savePreset() {
  let data = [];
  document.querySelectorAll(".row").forEach(row => {
    data.push({
      name: row.querySelector(".name").value,
      color: row.dataset.color
    });
  });
  localStorage.setItem("preset_" + currentTab, JSON.stringify(data));
}

/* 読み込み */
function loadPreset() {
  let container = document.getElementById("container");
  container.innerHTML = "";

  let data = JSON.parse(localStorage.getItem("preset_" + currentTab) || "null");

  if (!data || data.length === 0) {
    for (let i = 0; i < 6; i++) createRow();
  } else {
    data.forEach((d, i) => createRow(i, d));
  }
}

/* 枠 */
function createRow(i, data={}) {

  let time = 30;
  let interval = null;
  let running = false;

  const row = document.createElement("div");
  row.className = "row";
  row.style.background = data.color || "#333";
  row.dataset.color = data.color || "#333";

  // 背景タッチでタイマー停止・音停止・点滅解除
  row.onclick = () => {
    if(interval){
      clearInterval(interval);
      running = false;
      btn30.classList.remove("active");
      btn60.classList.remove("active");
      sound.pause();
      sound.currentTime = 0;
      row.classList.remove("blink");
    }
  };

  const top = document.createElement("div");
  top.className = "top";

  const name = document.createElement("input");
  name.className = "name";
  name.value = data.name || "";
  name.oninput = savePreset;

  const color = document.createElement("input");
  color.type = "color";
  color.className = "color";
  color.value = data.color || "#444444";

  color.oninput = () => {
    row.style.background = color.value;
    row.dataset.color = color.value;
    savePreset();
  };

  const display = document.createElement("div");
  display.className = "time";
  display.innerText = time;

  const btn30 = document.createElement("button");
  btn30.innerText = "30";
  btn30.onclick = (e) => {
    e.stopPropagation();
    start(30, btn30);
  };

  const btn60 = document.createElement("button");
  btn60.innerText = "60";
  btn60.onclick = (e) => {
    e.stopPropagation();
    start(60, btn60);
  };

  function stopTimer() {
    clearInterval(interval);
    running = false;
    btn30.classList.remove("active");
    btn60.classList.remove("active");
    sound.pause();
    sound.currentTime = 0;
    row.classList.remove("blink");
  }

  function start(sec, btn) {
    if (running) return stopTimer();

    stopTimer();
    time = sec;
    running = true;
    btn.classList.add("active");

    interval = setInterval(() => {
      if (time > 0) {
        time--;
        display.innerText = time;
      } else {
        stopTimer();
        sound.currentTime = 0;
        sound.play().catch(e => console.log("音声再生できません:", e));
        row.classList.add("blink");
      }
    }, 1000);
  }

  const btnWrap = document.createElement("div");
  btnWrap.className = "buttons";
  btnWrap.appendChild(btn30);
  btnWrap.appendChild(btn60);

  row.appendChild(top);
  top.appendChild(name);
  top.appendChild(color);
  row.appendChild(display);
  row.appendChild(btnWrap);

  document.getElementById("container").appendChild(row);
}

/* 追加削除 */
function addRow() {
  if (document.querySelectorAll(".row").length < maxRows) {
    createRow();
    savePreset();
  }
}

function removeRow() {
  let rows = document.querySelectorAll(".row");
  if (rows.length > 0) {
    rows[rows.length - 1].remove();
    savePreset();
  }
}

/* 初期化 */
switchTab(0);
updateTabs();
</script>

</body>
</html>
