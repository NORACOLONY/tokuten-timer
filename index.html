<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特典会タイマー</title>

<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: sans-serif;
  background: black;
  color: white;
  text-align: center;
  max-width: 100vw;
  overflow-x: hidden;
}
h2 { margin: 8px 0; font-size: 18px; }
#tabs { display:flex; gap:4px; padding:4px; overflow-x:auto; }
.tab { flex:1 0 auto; background:#222; padding:4px; border-radius:6px; font-size:12px; white-space:nowrap; }
.activeTab{ background:#00ff88; color:black; }

#container { display:grid; grid-template-columns:1fr; gap:6px; padding:4px; width:100%; }

.row {
  border-radius:12px;
  display:flex;
  flex-direction:column;
  background:#333;
  cursor:pointer;
  padding:6px;
  height:100px;
}
.row-content { display:flex; width:100%; }
.count { flex:1 1 50%; font-size:28px; display:flex; align-items:center; justify-content:center; }
.right { flex:1 1 50%; display:flex; gap:4px; align-items:center; padding:0 4px; }
.name { flex:1; padding:6px; font-size:14px; }
.color { width:32px; height:32px; border:none; padding:0; }
.buttons { display:flex; gap:4px; margin-top:6px; }
button { flex:1; font-size:16px; padding:10px 0; border-radius:8px; border:none; }
.active { background:#00ff88; color:black; }
.paused { background:yellow; color:black; }

.blink { animation: blinkBg 0.6s infinite; }
@keyframes blinkBg{50%{opacity:0.4;}}

#controls { margin:6px 0; display:flex; gap:4%; justify-content:center; }
#controls button{ width:28%; font-size:14px; padding:8px 0; }

#footer { margin:12px 0; font-size:10px; opacity:0.5; letter-spacing:2px; text-transform:uppercase; }
</style>
</head>
<body>

<h2>特典会タイマー</h2>
<div id="tabs"></div>
<div id="container"></div>

<div id="controls">
  <button onclick="addRow()">＋追加</button>
  <button onclick="removeRow()">−削除</button>
  <button onclick="toggleTestSound()">音声テスト</button>
</div>

<div id="footer">Created by TEURU</div>

<audio id="endSound" preload="auto">
  <source src="sounds/bell.mp3" type="audio/mpeg">
</audio>

<script>
let currentTab=0, maxRows=10;
const sound=document.getElementById("endSound");
let testPlaying=false;

/* タブ */
for(let i=0;i<5;i++){
  const tab=document.createElement("div");
  tab.className="tab";
  tab.innerText=localStorage.getItem("tab_name_"+i)||"Preset "+(i+1);
  tab.onclick=()=>{
    if(currentTab===i){
      const n=prompt("プリセット名変更",tab.innerText);
      if(n){tab.innerText=n;localStorage.setItem("tab_name_"+i,n);}
    } else switchTab(i);
  };
  tabs.appendChild(tab);
}

function switchTab(i){currentTab=i;loadPreset();updateTabs();}
function updateTabs(){document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("activeTab",i===currentTab));}

/* 保存 */
function savePreset(){
  const data=[];
  document.querySelectorAll(".row").forEach(r=>{
    data.push({
      name:r.querySelector(".name").value,
      color:r.dataset.color
    });
  });
  localStorage.setItem("preset_"+currentTab,JSON.stringify(data));
}

/* 読込 */
function loadPreset(){
  container.innerHTML="";
  const data=JSON.parse(localStorage.getItem("preset_"+currentTab)||"null");
  if(!data) for(let i=0;i<6;i++) createRow();
  else data.forEach(d=>createRow(0,d));
}

/* 枠 */
function createRow(i,data={}){
  let time=30, interval=null, state="inactive", activeBtn=null;

  const row=document.createElement("div");
  row.className="row";
  row.style.background=data.color||"#333";
  row.dataset.color=data.color||"#333";

  const rowContent=document.createElement("div");
  rowContent.className="row-content";

  const count=document.createElement("div");
  count.className="count";
  count.innerText=time;

  const right=document.createElement("div");
  right.className="right";

  const name=document.createElement("input");
  name.className="name";
  name.value=data.name||"";
  name.oninput=savePreset;

  const color=document.createElement("input");
  color.type="color";
  color.className="color";
  color.value=data.color||"#444444";
  color.oninput=()=>{row.style.background=color.value;row.dataset.color=color.value;savePreset();};

  const reset=document.createElement("button");
  reset.innerText="↺";
  reset.style.height="32px";
  reset.onclick=(e)=>{
    e.stopPropagation();
    stopTimer();
    time=30;
    count.innerText=time;
  };

  right.appendChild(name);
  right.appendChild(color);
  right.appendChild(reset);

  rowContent.appendChild(count);
  rowContent.appendChild(right);

  const btnWrap=document.createElement("div");
  btnWrap.className="buttons";

  const btn30=document.createElement("button");
  btn30.innerText="30";
  const btn60=document.createElement("button");
  btn60.innerText="60";

  function stopTimer(){
    clearInterval(interval);
    interval=null;

    btn30.classList.remove("active","paused");
    btn60.classList.remove("active","paused");

    btn30.disabled=false;
    btn60.disabled=false;

    sound.pause();
    sound.currentTime=0;
    row.classList.remove("blink");

    state="inactive";
    activeBtn=null;
  }

  function start(sec,btn){
    if(row.classList.contains("blink")) return;
    if(activeBtn && activeBtn!==btn) return;

    if(state==="inactive"){
      time=sec;
      count.innerText=time;
      activeBtn=btn;

      btn30.disabled = btn!==btn30;
      btn60.disabled = btn!==btn60;

      run();
      state="running";
      btn.classList.add("active");

    } else if(state==="running"){
      clearInterval(interval);
      state="paused";
      btn.classList.add("paused");

    } else {
      run();
      state="running";
      btn.classList.remove("paused");
    }
  }

  function run(){
    interval=setInterval(()=>{
      if(time>0){
        time--;
        count.innerText=time;
      } else {
        stopTimer();
        row.classList.add("blink");
        sound.currentTime=0;
        sound.play().catch(()=>{});
      }
    },1000);
  }

  btn30.onclick=(e)=>{e.stopPropagation();start(30,btn30);}
  btn60.onclick=(e)=>{e.stopPropagation();start(60,btn60);}

  row.onclick=()=>{
    if(row.classList.contains("blink")){
      sound.pause(); sound.currentTime=0;
      row.classList.remove("blink");
    }
  };

  btnWrap.append(btn30,btn60);
  row.append(rowContent,btnWrap);
  container.appendChild(row);
}

/* 操作 */
function addRow(){ if(document.querySelectorAll(".row").length<maxRows){createRow();savePreset();}}
function removeRow(){ const r=document.querySelectorAll(".row"); if(r.length){r[r.length-1].remove();savePreset();}}

/* 音声テスト */
function toggleTestSound(){
  if(testPlaying){
    sound.pause(); sound.currentTime=0;
    testPlaying=false;
  } else {
    sound.currentTime=0;
    sound.play().catch(()=>{});
    testPlaying=true;
  }
}

switchTab(0);
updateTabs();
</script>

</body>
</html>
