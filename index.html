<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特典会タイマー</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: sans-serif;
  background: black;
  color: white;
  text-align: center;
  overflow-x: hidden; /* 横スクロール防止 */
}

h2 { margin: 10px 0; font-size: 20px; }

#tabs {
  display: flex;
  gap: 4px;
  padding: 5px;
  overflow-x: auto;
}

.tab {
  flex: 1 0 auto;
  background: #222;
  padding: 6px;
  border-radius: 6px;
  font-size: 12px;
  white-space: nowrap;
}

.activeTab {
  background: #00ff88;
  color: black;
}

#container {
  display: grid;
  grid-template-columns: repeat(2, 1fr); /* 横2列固定 */
  gap: 4px;
  padding: 4px;
}

.row {
  border-radius: 10px;
  padding: 6px;
}

.top {
  display: flex;
  gap: 2px;
}

.name {
  flex: 1 1 0;
  font-size: 14px;
  min-width: 0;
  padding: 4px;
}

.color {
  width: 30px;
  padding: 0;
  border: none;
  background: none;
}

.time {
  font-size: clamp(18px, 8vw, 28px);
  margin: 2px 0;
}

.buttons {
  display: flex;
  gap: 2px;
}

button {
  flex: 1 1 0;
  padding: 12px 0; /* 少し縦大きめで押しやすく */
  font-size: 14px;
  border-radius: 6px;
  border: none;
}

.active {
  background: #00ff88;
  color: black;
}

.blink {
  animation: blinkBg 0.6s infinite;
}

@keyframes blinkBg {
  50% { opacity: 0.4; }
}

#controls {
  margin: 10px 0;
  display: flex;
  gap: 4%;
  justify-content: center;
}

#controls button {
  width: 45%;
  font-size: 14px;
  padding: 10px 0;
}

#footer {
  margin: 20px 0;
  font-size: 11px;
  opacity: 0.5;
  letter-spacing: 3px;
  text-transform: uppercase;
}
</style>
</head>
<body>

<h2>特典会タイマー</h2>
<div id="tabs"></div>
<div id="container"></div>

<div id="controls">
  <button onclick="addRow()">＋追加</button>
  <button onclick="removeRow()">−削除</button>
</div>

<div id="footer">Created by TEURU</div>

<audio id="endSound" preload="auto">
  <source src="sounds/bell.mp3" type="audio/mpeg">
</audio>

<script>
let currentTab = 0;
let maxRows = 10;
const sound = document.getElementById("endSound");
sound.load();

/* タブ生成 */
for (let i = 0; i < 5; i++) {
  let tab = document.createElement("div");
  tab.className = "tab";
  tab.innerText = localStorage.getItem("tab_name_"+i) || "Preset " + (i+1);
  tab.onclick = () => {
    if (currentTab === i) {
      let newName = prompt("プリセット名を変更", tab.innerText);
      if (newName) {
        tab.innerText = newName;
        localStorage.setItem("tab_name_"+i, newName);
      }
    } else { switchTab(i); }
  };
  document.getElementById("tabs").appendChild(tab);
}

/* タブ切替 */
function switchTab(i) {
  currentTab = i;
  loadPreset();
  updateTabs();
}
function updateTabs() {
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("activeTab", i===currentTab));
}

/* 保存 */
function savePreset() {
  let data = [];
  document.querySelectorAll(".row").forEach(row => {
    data.push({ name: row.querySelector(".name").value, color: row.dataset.color });
  });
  localStorage.setItem("preset_" + currentTab, JSON.stringify(data));
}

/* 読み込み */
function loadPreset() {
  const container = document.getElementById("container");
  container.innerHTML = "";
  const data = JSON.parse(localStorage.getItem("preset_" + currentTab) || "null");
  if (!data || data.length===0) for(let i=0;i<6;i++) createRow();
  else data.forEach((d,i)=>createRow(i,d));
}

/* 枠 */
function createRow(i,data={}) {
  let time=30, interval=null, running=false;

  const row = document.createElement("div");
  row.className="row";
  row.style.background=data.color||"#333";
  row.dataset.color=data.color||"#333";

  row.onclick=()=>{
    if(interval){ clearInterval(interval); running=false; btn30.classList.remove("active"); btn60.classList.remove("active"); sound.pause(); sound.currentTime=0; row.classList.remove("blink"); }
  };

  const top=document.createElement("div"); top.className="top";
  const name=document.createElement("input"); name.className="name"; name.value=data.name||""; name.oninput=savePreset;
  const color=document.createElement("input"); color.type="color"; color.className="color"; color.value=data.color||"#444444";
  color.oninput=()=>{ row.style.background=color.value; row.dataset.color=color.value; savePreset(); };

  const display=document.createElement("div"); display.className="time"; display.innerText=time;

  const btn30=document.createElement("button"); btn30.innerText="30"; btn30.onclick=(e)=>{ e.stopPropagation(); start(30,btn30); };
  const btn60=document.createElement("button"); btn60.innerText="60"; btn60.onclick=(e)=>{ e.stopPropagation(); start(60,btn60); };

  function stopTimer(){ clearInterval(interval); running=false; btn30.classList.remove("active"); btn60.classList.remove("active"); sound.pause(); sound.currentTime=0; row.classList.remove("blink"); }
  function start(sec,btn){ if(running) return stopTimer(); stopTimer(); time=sec; running=true; btn.classList.add("active"); interval=setInterval(()=>{ if(time>0){ time--; display.innerText=time; } else{ stopTimer(); sound.currentTime=0; sound.play().catch(e=>console.log("音声再生できません",e)); row.classList.add("blink"); } },1000); }

  const btnWrap=document.createElement("div"); btnWrap.className="buttons"; btnWrap.appendChild(btn30); btnWrap.appendChild(btn60);

  row.appendChild(top); top.appendChild(name); top.appendChild(color); row.appendChild(display); row.appendChild(btnWrap);
  document.getElementById("container").appendChild(row);
}

/* 追加削除 */
function addRow(){ if(document.querySelectorAll(".row").length<maxRows){ createRow(); savePreset(); } }
function removeRow(){ let rows=document.querySelectorAll(".row"); if(rows.length>0){ rows[rows.length-1].remove(); savePreset(); } }

/* 初期化 */
switchTab(0); updateTabs();
</script>

</body>
</html>
